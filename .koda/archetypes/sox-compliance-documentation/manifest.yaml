  - change-management
  - review
  - development
  - logging
  - validation
  constitution:
    path: sox-compliance-constitution.md
  dependencies: []
  workflows:
    scaffold: scaffold-sox-compliance
    test: test-sox-compliance
    debug: debug-sox-compliance
    refactor: refactor-sox-compliance
    document: document-sox-compliance
    compare: compare-sox-compliance
