# Environment Configuration for git-secret-remediation
# Purpose: Configuration for git secret remediation workflows and AT&T policy compliance

tools:
  git_filter_repo: "2.38+"
  detect_secrets: "1.4+"
  pre_commit: "3.0+"
  azure_cli: "2.50+"
  git: "2.30+"

key_vault:
  azure:
    enabled: true
    vault_url_pattern: "https://{vault-name}.vault.azure.net/"
    auth_method: "DefaultAzureCredential"
    rbac_role: "Key Vault Secrets User"
  hashicorp:
    enabled: false
    requires_license: true
    license_cost: "$160/client/year (Test + Production)"
    onboarding_url: "https://devhub.web.att.com/docs/default/component/apm0044907-documentation-library/hashicorp-vault/"

github:
  security_alert_url: "https://github.com/{org}/{repo}/security/secret-scanning"
  push_protection: true
  secret_scanning: true
  security_liaison_sla:
    standard: "3 business days"
    escalated: "1 business day"

attestations:
  policy_effective_date: "2025-08-11"
  required: true
  exact_text_only: true
  types:
    revoked: "Submitter confirms the secret has been remediated per AT&T policy and poses no risk. Falsification of this attestation violates AT&T's Code of Business Conduct and may result in disciplinary action."
    false_positive: "Submitter confirms the alert is a false positive and poses no risk. Falsification of this attestation violates AT&T's Code of Business Conduct and may result in disciplinary action."
    non_att: "The submitter affirms that the secret is neither owned by AT&T nor by its employees or contractors, has been removed from the default branch. Falsification of this attestation violates AT&T's Code of Business Conduct and may result in disciplinary action."

remediation:
  backup_branch_required: true
  backup_branch_pattern: "backup-before-secret-removal-{timestamp}"
  dry_run_required: true
  verification_commands:
    - "git log --all --full-history -S\"{pattern}\""
    - "git grep \"{pattern}\" $(git rev-list --all)"
  force_push_approval_required: true
  team_coordination_required: true

preventive_measures:
  pre_commit_hooks:
    enabled: true
    tool: "detect-secrets"
    baseline_file: ".secrets.baseline"
  gitignore_patterns:
    - ".env"
    - ".env.local"
    - ".env.*.local"
    - "*.env"
    - "*.pem"
    - "*.key"
    - "*.p12"
    - "*.pfx"
    - "credentials.json"
    - "*-credentials.json"
    - "config/secrets.yaml"
  github_push_protection: true
  ci_cd_scanning: true

documentation:
  incident_report_required: true
  post_incident_review_required: true
  compliance_artifacts:
    - "incident_summary"
    - "timeline"
    - "remediation_actions"
    - "root_cause_analysis"
    - "preventive_measures"
  mdp_security_tracker: "MDP-Security Alert Response Document Tracker"

variables:
  max_secret_age_days: 0  # Secrets must be rotated immediately
  credential_rotation_mandatory: true
  key_vault_storage_mandatory: true
  attestation_rejection_auto: true  # Auto-reject if attestation is modified

references:
  att_devhub: "https://devhub.web.att.com/docs/default/component/apm0044907-documentation-library/secrets/remediation/"
  git_filter_repo: "https://github.com/newren/git-filter-repo"
  github_docs: "https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/removing-sensitive-data-from-a-repository"
  azure_key_vault: "https://learn.microsoft.com/en-us/azure/key-vault/general/security-features"
