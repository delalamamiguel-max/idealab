# Environment Configuration for interpretability analyst
# Focus: explainable AI workflows and responsible disclosures

python:
  version: "3.10"

libraries:
  - shap: "0.44+"
  - lime: "0.2.0.1"
  - alibi: "0.9+"
  - interpret: "0.4+"
  - mlflow: "2.11+"
  - pandas: "2.1+"
  - numpy: "1.26+"
  - matplotlib: "3.8+"

explainability:
  default_methods:
    tabular:
      - "shap_kernel"
      - "shap_tree"
    text:
      - "lime_text"
      - "shap_text"
    vision:
      - "grad_cam"
  sensitivity_analysis: true

compliance:
  rai_dashboard_workspace: "AI-RAI"
  documentation_repo: "rai-reports"
  approval_group: "responsible-ai-review@company.com"

security:
  pii_masking_required: true
  model_card_storage: "abfss://rai@<storage-account>.dfs.core.windows.net/model_cards"

mlflow:
  tracking_uri: "databricks"
  artifact_path: "interpretability"

ci:
  azure_devops_project: "AI-Analytics"
  pipeline: "Rai-Explainability"
  scan_tools:
    - "bandit"
    - "pip-audit"

variables:
  max_feature_contributors: 15
  explanation_precision_threshold: 0.9
