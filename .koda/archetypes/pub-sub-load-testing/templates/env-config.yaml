python_version: "3.10"

available_libraries:
  - google-cloud-pubsub-2.19.0
  - locust-2.20.0
  - pytest-7.4.3

messaging_platforms:
  - google_pubsub
  - azure_service_bus
  - kafka
  - rabbitmq

load_testing_configuration:
  concurrent_publishers: 100
  concurrent_subscribers: 100
  message_size_kb: 10
  duration_minutes: 30
  ramp_up_seconds: 60

metrics_collection:
  - throughput_msgs_per_sec
  - latency_percentiles
  - error_rate
  - queue_depth

performance_targets:
  max_latency_p99_ms: 1000
  min_throughput_msgs_per_sec: 1000
  max_error_rate_percent: 0.1

references:
  constitution: ".cdo-aifc/memory/archetypes/08-software-quality-maintenance/pub-sub-load-testing-constitution.md"
