# Agent Archetype: Agent Developer
# Category: 10-agentic-development
# Purpose: Production-grade AI agents with ReAct, RAG, tools, and memory
# Version: 1.0.0

python_version: "3.10"

performance:
  profile: "balanced"
  latency_target_ms: 2000
  throughput_target_rps: 5
  tracing_required: true

variables:
  required:
    - OPENAI_API_KEY
  optional:
    - ANTHROPIC_API_KEY
    - LANGSMITH_API_KEY
    - LANGSMITH_PROJECT
    - PHOENIX_ENDPOINT
    - CHROMADB_HOST

# Required libraries and versions
available_libraries:
  # Core frameworks
  - langchain>=0.1.0
  - langgraph>=0.0.20
  - langsmith>=0.0.70
  
  # LLM providers
  - openai>=1.10.0
  - anthropic>=0.8.0
  
  # Vector stores (for RAG)
  - chromadb>=0.4.0
  - faiss-cpu>=1.7.0
  
  # Utilities
  - pydantic>=2.5.0
  - pydantic-settings>=2.0.0
  - python-dotenv>=1.0.0

# Default parameters
default_parameters:
  # Model configuration
  model:
    provider: "openai"
    name: "gpt-4-turbo-preview"
    temperature: 0.0
    max_tokens: 4096
  
  # Agent limits (HARD STOPS)
  limits:
    max_iterations: 10
    timeout_seconds: 300
    max_tool_calls_per_iteration: 5
    max_context_tokens: 8000
  
  # Memory configuration
  memory:
    type: "conversation"  # none | conversation | persistent
    max_messages: 50
    checkpoint_enabled: true
  
  # Tool configuration
  tools:
    enabled: true
    timeout_per_tool_ms: 30000
    retry_attempts: 2
    validate_inputs: true
    validate_outputs: true
  
  # RAG configuration
  rag:
    enabled: false
    retriever_type: "vector"
    top_k: 5
    similarity_threshold: 0.7
  
  # Observability
  observability:
    tracing_enabled: true
    langsmith_project: ""
    log_level: "INFO"
    metrics_enabled: true

# Environment variables required
required_env_vars:
  - OPENAI_API_KEY

# Optional environment variables
optional_env_vars:
  - ANTHROPIC_API_KEY
  - LANGSMITH_API_KEY
  - LANGSMITH_PROJECT
  - PHOENIX_ENDPOINT
  - CHROMADB_HOST

# Maturity level requirements
level_requirements:
  L1:
    description: "Scripted - Deterministic flows"
    features:
      - prompt_chaining
      - structured_output
    requirements: []
  L2:
    description: "Augmented - RAG or read-only tools"
    features:
      - rag_retrieval
      - read_only_tools
    requirements:
      - memory_enabled
  L3:
    description: "Transactional - Tools with side effects"
    features:
      - tool_execution
      - checkpointing
    requirements:
      - guardrails_enabled
      - checkpointing_enabled
      - tracing_enabled
  L4:
    description: "Autonomous - Multi-agent, self-correction"
    features:
      - multi_agent
      - self_correction
      - human_in_the_loop
    requirements:
      - guardrails_enabled
      - checkpointing_enabled
      - tracing_enabled
      - phoenix_enabled

# Validation rules
validation:
  max_iterations_min: 1
  max_iterations_max: 100
  timeout_seconds_min: 30
  timeout_seconds_max: 3600
  required_for_l3_plus:
    - guardrails_integration
    - checkpointing
    - tracing
