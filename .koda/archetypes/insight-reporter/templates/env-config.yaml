# Environment Configuration for insight reporter
# Focus: model performance analytics, dashboards, and business storytelling

python:
  version: "3.10"

libraries:
  - pandas: "2.1+"
  - numpy: "1.26+"
  - matplotlib: "3.8+"
  - seaborn: "0.13+"
  - plotly: "5.18+"
  - powerbiclient: "3.0+"
  - mlflow: "2.11+"
  - evidently: "0.4+"
  - shap: "0.44+"

visualization:
  dashboard_targets:
    databricks_sql: "/Shared/dashboards/model_performance"
    power_bi_workspace: "AI Analytics Insights"
  att_brand_palette: true
  accessibility:
    enforce_wcag: true

reporting:
  template_repo: "insight-templates"
  default_format: "html"
  executive_summary_length: 6

observability:
  metric_store_table: "analytics.model_performance_metrics"
  business_kpi_table: "analytics.business_outcomes"

ci:
  azure_devops_project: "AI-Analytics"
  pipeline: "Model-Insights-Delivery"
  linting: "markdownlint"

security:
  pii_redaction: true
  publish_reviewers:
    - "analytics_execs@company.com"
    - "compliance_review@company.com"

variables:
  rolling_window_days: 30
  sli_target_accuracy: 0.92
  sli_target_latency_ms: 500
