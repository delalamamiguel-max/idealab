# Environment Configuration for DBSCAN model
# Companion to `reference/memory/archetypes/dbscan-model-constitution.md`

workspace:
  platform: "databricks"
  unity_catalog: true
  default_catalog: "mlops"

python:
  version: "3.10"

libraries:
  - scikit-learn: "1.4+"
  - hdbscan: "0.8.33+"
  - umap-learn: "0.5.5+"
  - numpy: "1.26+"
  - pandas: "2.1+"
  - joblib: "1.3+"
  - mlflow: "2.13+"
  - great_expectations: "0.18.2+"

preprocessing:
  scaler: "StandardScaler"
  encoder: "OneHotEncoder"
  imputer_strategy: "median"
  dimensionality_reduction:
    enabled: true
    method: "PCA"
    target_components: 20
    variance_retained: 0.95

feature_store:
  table: "feature_store.dbscan_features"
  primary_keys:
    - "entity_id"
  timestamp_key: "event_ts"

training_data:
  train_path: "dbfs:/mnt/features/dbscan/train"
  validation_path: "dbfs:/mnt/features/dbscan/validation"
  schema_registry_topic: "dbscan.feature.schema"

modeling:
  algorithm: "dbscan"
  metric: "euclidean"
  algorithm_backend: "ball_tree"
  n_jobs: -1
  eps_search:
    range: [0.05, 5.0]
    step: 0.05
    heuristic: "k-distance-plot"
    artifacts_path: "dbfs:/mnt/artifacts/dbscan/eps-scan"
  min_samples:
    default_formula: "max(3, n_features + 1)"
    grid: [5, 10, 15, 20]
  leaf_size: 40

model_validation:
  metrics:
    - "silhouette"
    - "davies_bouldin"
    - "cluster_size_distribution"
    - "noise_ratio"
  noise_ratio_threshold: 0.4
  post_validation_hooks:
    - "persist_diagnostics"
    - "update_model_card"

mlflow:
  tracking_uri: "databricks"
  experiment_path: "/Shared/dbscan/experiments"
  registry_name: "uc_ai.dbscan_models"
  model_card_path: "dbfs:/mnt/model-cards/dbscan"
  lineage_table: "mlops.lineage.dbscan_models"

artifacts:
  plots_path: "dbfs:/mnt/reports/dbscan/plots"
  diagnostics_path: "dbfs:/mnt/reports/dbscan/diagnostics"
  config_archive: "dbfs:/mnt/config-history/dbscan"

compute:
  training_cluster:
    node_type: "Standard_D16s_v4"
    min_workers: 2
    max_workers: 6
    auto_termination_minutes: 30
  inference_cluster:
    node_type: "Standard_D8s_v4"
    min_workers: 1
    max_workers: 4

monitoring:
  drift:
    schedule_cron: "0 6 * * *"
    metrics:
      - "mean_neighbor_distance"
      - "noise_ratio"
    alert_thresholds:
      mean_neighbor_distance_pct_change: 0.2
      noise_ratio_pct_change: 0.1
    output_table: "mlops.monitoring.dbscan_drift"
  audit_log_table: "mlops.audit.dbscan_events"

security:
  secret_scope: "mlops-secrets"
  service_principal: "svc-dbscan-ml"
  encryption_key_vault: "kv-mlops-dbscan"

variables:
  runtime_uuid_env: "RUNTIME_UUID"
  lineage_id_env: "LINEAGE_ID"
  artifact_bucket: "dbfs:/mnt/dbscan-artifacts"
  config_source: "abfss://configs@<storage>.dfs.core.windows.net/dbscan/env.yaml"
