# Agent Archetype: Eval Specialist
# Category: 10-agentic-development
# Purpose: LLM evaluation with custom graders and SOX compliance

python_version: "3.10"

performance:
  profile: "thorough"
  async_grading: true
  max_parallel_graders: 8
  report_timeout_seconds: 600

variables:
  required:
    - OPENAI_API_KEY
  optional:
    - PHOENIX_ENDPOINT
    - LANGSMITH_API_KEY
    - MLFLOW_TRACKING_URI

validation:
  baseline_required: true
  audit_logging_required: true
  minimum_pass_rate: 0.8

available_libraries:
  - deepeval>=0.21.0
  - ragas>=0.1.0
  - arize-phoenix>=4.0.0
  - langsmith>=0.0.70
  - mlflow>=2.10.0
  - pandas>=2.0.0

default_parameters:
  judge:
    default_model: "gpt-4"
    fallback_model: "gpt-3.5-turbo"
    temperature: 0.0
    provide_explanations: true
  
  thresholds:
    faithfulness: 0.9
    hallucination: 0.95
    task_completion: 0.8
    tool_correctness: 0.9
    toxicity: 0.99
    pii_leakage: 1.0
  
  phoenix:
    project_name: "agent-evals"
    sox_scope: true
    retention_years: 7

required_env_vars:
  - OPENAI_API_KEY

optional_env_vars:
  - PHOENIX_ENDPOINT
  - LANGSMITH_API_KEY
  - MLFLOW_TRACKING_URI
