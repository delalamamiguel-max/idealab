python_version: "3.10"
spark_version: "13.3.x-scala2.12"

available_libraries:
  - mlflow-2.12.1
  - hyperopt-0.2.10
  - great_expectations-0.18.2
  - databricks-feature-store-0.15.0
  - sparkml-3.3.0
  - scikit-learn-1.4.2

default_parameters:
  knn:
    k: 15
    distance_metric: "cosine"
  dbscan:
    epsilon: 0.35
    min_points: 25
