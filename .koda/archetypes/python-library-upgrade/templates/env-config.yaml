python_version: "3.10"

dependency_management:
  requirements_file: "requirements.txt"
  lock_file: "requirements.lock"
  vulnerability_scanning: true
  license_compliance: true

testing_frameworks:
  - pytest
  - unittest
  - tox
  - coverage

upgrade_process:
  compatibility_checks: true
  regression_testing: true
  rollback_plan: true

ci_cd_integration:
  build_validation: true
  test_execution: true
  dependency_security_scan: true

security_tools:
  - safety
  - bandit
  - pip_audit

references:
  constitution: ".cdo-aifc/memory/archetypes/08-software-quality-maintenance/python-library-upgrade-constitution.md"
