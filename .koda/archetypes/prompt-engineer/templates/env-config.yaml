# Agent Archetype: Prompt Engineer
# Category: 10-agentic-development
# Purpose: Prompt template creation and optimization

python_version: "3.10"

performance:
  profile: "token-aware"
  max_prompt_length: 8000
  optimization_target: "quality-first"
  token_budget_tracking: true

variables:
  required:
    - OPENAI_API_KEY
  optional:
    - ANTHROPIC_API_KEY

validation:
  versioning_required: true
  compatible_models_required: true
  output_length_guidance_required: true

available_libraries:
  - langchain>=0.1.0
  - tiktoken>=0.5.2
  - jinja2>=3.1.2
  - pydantic>=2.5.0

default_parameters:
  model:
    provider: "openai"
    name: "gpt-4-turbo-preview"
    temperature: 0.0
  prompt:
    max_length: 8000
    include_examples: true
    versioning: "semantic"
  token_limits:
    gpt-4: 8192
    gpt-4-turbo: 128000
    claude-3: 200000

required_env_vars:
  - OPENAI_API_KEY

optional_env_vars:
  - ANTHROPIC_API_KEY
