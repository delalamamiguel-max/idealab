# Environment Configuration for data sourcing specialist
# Focus: governed data discovery and ingestion readiness in Databricks

spark:
  version: "3.5+"
  unity_catalog: true

python:
  version: "3.10"

libraries:
  - databricks-sdk: "0.21+"
  - pyspark: "3.5+"
  - great-expectations: "0.18+"
  - azure-identity: "1.15+"
  - azure-keyvault-secrets: "4.8+"
  - mlflow: "2.11+"

workspace:
  databricks:
    host: "https://adb-<workspace-id>.<region>.azuredatabricks.net"
    catalog: "enterprise_analytics"
    schema_prefix: "ds_discovery"

storage:
  landing_zone_container: "abfss://landing@<storage-account>.dfs.core.windows.net"
  governed_zone_container: "abfss://curated@<storage-account>.dfs.core.windows.net"

security:
  key_vault_name: "kv-enterprise-analytics"
  managed_identity_client_id: "00000000-0000-0000-0000-000000000000"
  purview_account: "purview-enterprise"

discovery:
  catalog_crawler_job: "catalog-metadata-refresh"
  max_table_preview_rows: 1000
  sample_fraction_cap: 0.05

ci:
  azure_devops_project: "AI-Analytics"
  data_contract_repo: "ds-data-contracts"
  policy_pipeline: "DataDiscoveryPolicies"

variables:
  default_data_retention_days: 30
  sampling_budget_gb: 5
