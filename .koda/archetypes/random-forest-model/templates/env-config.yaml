# Environment Configuration for Random Forest
# Focus: governed Random Forest model development leveraging Databricks, MLflow, and Azure DevOps

spark:
  version: "3.5+"
  unity_catalog: true

python:
  version: "3.10"

libraries:
  - mlflow: "2.11+"
  - databricks-feature-store: "0.18+"
  - scikit-learn: "1.4+"  # core RandomForestClassifier/Regressor
  - shap: "0.44+"          # explainability for tree models
  - pandas: "2.1+"
  - numpy: "1.26+"
  - scipy: "1.11+"
  - great-expectations: "0.18+"  # data quality & validation
  - evidently: "0.4+"             # drift & fairness metrics
  - hyperopt: "0.2.7"             # tuning (bounded search)

mlflow:
  tracking_uri: "databricks"
  experiment_path: "/Shared/models/random_forest"
  registry_uri: "databricks-uc"
  model_name_prefix: "ent_rf_"

azure_devops:
  project: "AI-Analytics"
  repo: "ml-models"
  pipeline: "RandomForest-Model-Build"

ci:
  tests:
    framework: "pytest"
    min_coverage: "85%"
  build_image: "mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04"

compute:
  training_cluster:
    node_type: "Standard_NC6s_v3"
    min_workers: 2
    max_workers: 8

security:
  secret_scope: "mlops-secrets"
  approved_databricks_runtime: "13.3 LTS ML"

variables:
  default_training_timeout_minutes: 240
  registered_model_stage: "Staging"
  default_primary_metric: "validation_auc"
  random_seed: 1729
  default_n_estimators: 500
  max_n_estimators: 1500
  max_depth_ceiling: 40
  drift_psi_threshold: 0.2
  fairness_demographic_parity_diff: 0.10

# NOTE: No credentials or API tokens should be placed in this file.
