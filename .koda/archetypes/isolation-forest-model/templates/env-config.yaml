# Environment Configuration for Isolation Forest model
# Companion to `reference/memory/archetypes/isolation-forest-model-constitution.md`

spark:
  version: "3.5+"
  unity_catalog: true
  runtime: "13.3 LTS ML"

python:
  version: "3.10"

libraries:
  - pyspark: "3.5+"
  - scikit-learn: "1.4+"
  - pyod: "1.1+"
  - mlflow: "2.11+"
  - optuna: "3.4+"
  - shap: "0.44+"
  - numpy: "1.26+"
  - pandas: "2.1+"
  - matplotlib: "3.8+"
  - evidently: "0.4+"
  - great-expectations: "0.18+"
  - shap: "0.45+"

preprocessing:
  data_profiling:
    enabled: true
    report_path: "dbfs:/mnt/reports/isolation_forest/prep-profile"
  imputer:
    strategy: "median"
    categorical_strategy: "most_frequent"
    log_table: "mlops.audit.isolation_forest_imputations"
  scaling:
    default: "RobustScaler"
    fallback:
      name: "QuantileTransformer"
      trigger: "skewness > 2 or heavy_tail"
  encoding:
    low_cardinality: "OneHotEncoder"
    high_cardinality:
      method: "TargetEncoder"
      smoothing: 0.3
      seed_env: "IF_ENCODER_SEED"
  outlier_handling:
    enabled: true
    method: "winsorize"
    lower_quantile: 0.005
    upper_quantile: 0.995
  feature_selection:
    variance_threshold: 0.0
    mutual_information_top_k: 100
  dimensionality_reduction:
    enabled: true
    min_feature_threshold: 30
    method: "PCA"
    target_components: 25
    variance_retained: 0.97
    diagnostics_path: "dbfs:/mnt/artifacts/isolation_forest/pca"
    components_path: "dbfs:/mnt/artifacts/isolation_forest/pca/components"

feature_store:
  enabled: true
  table: "feature_store.isolation_forest_features"
  primary_keys:
    - "entity_id"
  timestamp_key: "event_ts"

training_data:
  train_path: "dbfs:/mnt/features/isolation_forest/train"
  validation_path: "dbfs:/mnt/features/isolation_forest/validation"
  schema_registry_topic: "isolation_forest.feature.schema"

model:
  algorithm: "isolation_forest"
  n_estimators:
    default: 400
    grid: [200, 400, 600]
  max_samples:
    strategy: "auto"
    min_value_formula: "min(256, n_features * 10)"
  max_features:
    range: [0.5, 1.0]
    step: 0.1
  contamination:
    estimation_method: "quantile_analysis"
    search_grid: [0.01, 0.02, 0.05, 0.1]
    baseline_incident_rate_table: "mlops.baselines.isolation_forest_incidents"
  random_state_env: "IF_RANDOM_SEED"
  parallel_jobs: -1
  score_calibration:
    enabled: true
    method: "isotonic"
    artifacts_path: "dbfs:/mnt/artifacts/isolation_forest/calibration"

training:
  temporal_split:
    strategy: "rolling_window"
    train_window_days: 120
    validation_window_days: 30
    test_window_days: 30
  cross_validation_folds: 5
  max_runtime_minutes: 240
  spark_table_checkpoint: "mlops.enterprise_analytics.if_training_checkpoint"
  sample_floor: "min(256, n_features * 10)"

model_validation:
  metrics:
    - "precision_at_k"
    - "recall_at_k"
    - "pr_auc"
    - "score_distribution_drift"
  expected_anomaly_rate: 0.03
  anomaly_rate_threshold_multiplier: 2.0
  post_validation_hooks:
    - "persist_diagnostics"
    - "update_model_card"
    - "register_lineage"

mlflow:
  tracking_uri: "databricks"
  experiment_path: "/Shared/isolation_forest/experiments"
  registry_name: "uc_ai.isolation_forest_models"
  model_card_path: "dbfs:/mnt/model-cards/isolation_forest"
  lineage_table: "mlops.lineage.isolation_forest_models"

artifacts:
  plots_path: "dbfs:/mnt/reports/isolation_forest/plots"
  diagnostics_path: "dbfs:/mnt/reports/isolation_forest/diagnostics"
  config_archive: "dbfs:/mnt/config-history/isolation_forest"

compute:
  training_cluster:
    node_type: "Standard_D16s_v4"
    min_workers: 2
    max_workers: 8
    auto_termination_minutes: 30
  inference_cluster:
    node_type: "Standard_D8s_v4"
    min_workers: 1
    max_workers: 4

monitoring:
  drift:
    schedule_cron: "30 6 * * *"
    metrics:
      - "anomaly_score_quantiles"
      - "contamination_rate"
    alert_thresholds:
      anomaly_score_quantile_shift: 0.15
      contamination_rate_pct_change: 0.1
    output_table: "mlops.monitoring.isolation_forest_drift"
  audit_log_table: "mlops.audit.isolation_forest_events"

security:
  secret_scope: "mlops-secrets"
  service_principal: "svc-isolation-forest-ml"
  encryption_key_vault: "kv-mlops-isolation-forest"

approvals:
  signoff_groups:
    - "data-owners@company.com"
    - "security-review@company.com"
    - "business-stakeholders@company.com"
    - "responsible-ai-review@company.com"
  checklist_path: "/Shared/anomaly/if_approval_checklist"
  baseline_refresh_board: "Baseline-Stewardship-Board"

variables:
  runtime_uuid: "${runtime_uuid}"
  lineage_id: "${lineage_id}"
  default_threshold_percentile: 0.98
  min_positive_labels_required: 10
  warm_start_enabled: true
  lineage_tag: "${lineage_id}"
  max_exemplar_export: 25
  artifact_bucket: "dbfs:/mnt/isolation_forest-artifacts"
  config_source: "abfss://configs@<storage>.dfs.core.windows.net/isolation_forest/env.yaml"
