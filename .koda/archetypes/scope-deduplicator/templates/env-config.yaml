# Agent Archetype: Scope Deduplicator
# Version: 1.1.0

performance:
  max_agents_scanned: 500
  similarity_computation_timeout_ms: 10000
  batch_size: 32
  cache_ttl_seconds: 1800

variables:
  similarity_threshold: 0.8
  require_review: true
  python_version: "3.10"
  available_libraries:
    - sentence-transformers>=2.2.0
    - faiss-cpu>=1.7.0
    - numpy>=1.24.0
  required_env_vars: []

validation:
  min_similarity_threshold: 0.5
  max_similarity_threshold: 0.99
  min_agents_for_comparison: 2
  required_fields:
    - agent_name
    - capabilities
  schema_version: "1.1.0"
