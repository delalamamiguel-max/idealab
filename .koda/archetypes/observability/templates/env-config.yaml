# Observability Environment Configuration
# This configuration defines the standards for observability tooling and practices.

execution_env:
  type: virtualenv
  python_version: "3.10"
  requirements_file: "requirements.txt"

environment_variables:
  - OTEL_COLLECTOR_ENDPOINT: "http://localhost:4317"
  - LOG_LEVEL: "INFO"
  - ENABLE_TRACING: "true"

tooling:
  linting:
    python: "pylint"
    yaml: "yamllint"
  testing:
    framework: "pytest"
    coverage_threshold: 80

observability_standards:
  logging_format: "json"
  metrics_backend: "prometheus"
  tracing_backend: "jaeger"

ci_cd:
  pipeline_provider: "github-actions"
  enforce_pr_reviews: true
